# Portfolio Universe Definition
# Maps investable ETFs/stocks -> indicator_codes in history/market_data.csv
#
# asset_class 분류:
#   equity_us / equity_dm / equity_em / equity_global
#   ust_long / ust_mid / ust_short / agg_bond / credit_hy / credit_ig / em_debt / tips
#   gold / commodity / usd
#   sector_us (XLK 등 SPDR 11섹터)
#   sector_kr (KODEX 4섹터)
#   style_us  (팩터 ETF: 모멘텀/가치/퀄리티/저변동)
#   stocks    (개별 주식 — 백테스트 IC 분석에서 제외)

macro_signals:
  yield_curve:
    long: BD_US_10Y     # 10Y Treasury yield
    short: BD_US_2Y     # 2Y Treasury yield
  vix: RK_VIX
  dxy: FX_DXY

assets:
