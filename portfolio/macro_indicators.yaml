# Macro Economic Indicators
# FRED API: https://fred.stlouisfed.org/
# ECOS API: https://ecos.bok.or.kr/

indicators:
  # ─── US Growth ──────────────────────────────────────────────
  US_GDP_QOQ:
    category: growth
    region: US
    source: FRED
    series_id: GDP
    unit: "%"
    description: "US GDP Growth (QoQ)"
    transform: pct_change

  US_GDP_YOY:
    category: growth
    region: US
    source: FRED
    series_id: GDP
    unit: "%"
    description: "US GDP Growth (YoY)"
    transform: pct_change_yoy

  # ─── US Inflation ───────────────────────────────────────────
  US_CPI_YOY:
    category: inflation
    region: US
    source: FRED
    series_id: CPIAUCSL
    unit: "%"
    description: "US CPI (YoY)"
    transform: pct_change_yoy

  US_CORE_CPI_YOY:
    category: inflation
    region: US
    source: FRED
    series_id: CPILFESL
    unit: "%"
    description: "US Core CPI (YoY)"
    transform: pct_change_yoy

  US_PCE_YOY:
    category: inflation
    region: US
    source: FRED
    series_id: PCEPI
    unit: "%"
    description: "US PCE Price Index (YoY)"
    transform: pct_change_yoy

  US_CORE_PCE_YOY:
    category: inflation
    region: US
    source: FRED
    series_id: PCEPILFE
    unit: "%"
    description: "US Core PCE (YoY)"
    transform: pct_change_yoy

  # ─── US Employment ──────────────────────────────────────────
  US_UNEMP_RATE:
    category: employment
    region: US
    source: FRED
    series_id: UNRATE
    unit: "%"
    description: "US Unemployment Rate"
    transform: none

  US_NFP_MOM:
    category: employment
    region: US
    source: FRED
    series_id: PAYEMS
    unit: "k"
    description: "US Nonfarm Payrolls (MoM change)"
    transform: diff

  # ─── US PMI ─────────────────────────────────────────────────
  US_ISM_MFG:
    category: sentiment
    region: US
    source: FRED
    series_id: NAPM
    unit: "index"
    description: "ISM Manufacturing PMI"
    transform: none

  US_ISM_SVC:
    category: sentiment
    region: US
    source: FRED
    series_id: NAPMNOI
    unit: "index"
    description: "ISM Services PMI"
    transform: none

  # ─── US Policy ──────────────────────────────────────────────
  US_FED_RATE:
    category: policy
    region: US
    source: FRED
    series_id: FEDFUNDS
    unit: "%"
    description: "Federal Funds Effective Rate"
    transform: none

  US_10Y_YIELD:
    category: policy
    region: US
    source: FRED
    series_id: DGS10
    unit: "%"
    description: "10-Year Treasury Yield"
    transform: none

  US_2Y_YIELD:
    category: policy
    region: US
    source: FRED
    series_id: DGS2
    unit: "%"
    description: "2-Year Treasury Yield"
    transform: none

  US_YIELD_CURVE:
    category: policy
    region: US
    source: FRED
    series_id: T10Y2Y
    unit: "bp"
    description: "10Y-2Y Yield Curve Spread"
    transform: none

  # ─── US Credit ──────────────────────────────────────────────
  US_IG_SPREAD:
    category: credit
    region: US
    source: FRED
    series_id: BAMLC0A0CM
    unit: "bp"
    description: "IG Corporate Bond Spread"
    transform: none

  US_HY_SPREAD:
    category: credit
    region: US
    source: FRED
    series_id: BAMLH0A0HYM2
    unit: "bp"
    description: "High Yield Bond Spread"
    transform: none

  # ─── Korea Growth ───────────────────────────────────────────
  KR_GDP_QOQ:
    category: growth
    region: KR
    source: ECOS
    series_id: "200Y104"
    cycle: "Q"
    item_code: "1400"
    unit: "%"
    description: "Korea Real GDP Growth (QoQ, seasonally adjusted)"
    transform: pct_change

  KR_GDP_YOY:
    category: growth
    region: KR
    source: ECOS
    series_id: "200Y104"
    cycle: "Q"
    item_code: "1400"
    unit: "%"
    description: "Korea Real GDP Growth (YoY, seasonally adjusted)"
    transform: pct_change_yoy

  # ─── Korea Inflation ────────────────────────────────────────
  KR_CPI_YOY:
    category: inflation
    region: KR
    source: ECOS
    series_id: "901Y009"
    cycle: "M"
    item_code: "0"
    unit: "%"
    description: "Korea CPI (YoY)"
    transform: pct_change_yoy

  KR_CORE_CPI_YOY:
    category: inflation
    region: KR
    source: ECOS
    series_id: "901Y009"
    cycle: "M"
    item_code: "X0"
    unit: "%"
    description: "Korea Core CPI (YoY)"
    transform: pct_change_yoy

  # ─── Korea Employment ───────────────────────────────────────
  KR_UNEMP_RATE:
    category: employment
    region: KR
    source: ECOS
    series_id: "901Y027"
    cycle: "M"
    item_code: "I61BC"
    unit: "%"
    description: "Korea Unemployment Rate"
    transform: value

  # ─── Korea Sentiment (BSI) ──────────────────────────────────
  # TODO: BSI requires multi-level item_code (C0000/AA) - implement later
  # KR_MFG_BSI:
  #   category: sentiment
  #   region: KR
  #   source: ECOS
  #   series_id: "512Y013"
  #   cycle: "M"
  #   item_code: "C0000/AA"
  #   unit: "index"
  #   description: "Korea Manufacturing Business Survey Index (BSI)"
  #   transform: value

  # ─── Korea Policy ───────────────────────────────────────────
  KR_BASE_RATE:
    category: policy
    region: KR
    source: ECOS
    series_id: "722Y001"
    cycle: "D"
    item_code: "0101000"
    unit: "%"
    description: "Korea Base Rate"
    transform: value

  # ─── US Liquidity ───────────────────────────────────────────
  US_M2_YOY:
    category: liquidity
    region: US
    source: FRED
    series_id: M2SL
    unit: "%"
    description: "US M2 Money Supply (YoY)"
    transform: pct_change_yoy
    cycle: "M"

  US_FED_BALANCE:
    category: liquidity
    region: US
    source: FRED
    series_id: WALCL
    unit: "%"
    description: "Fed Balance Sheet (YoY)"
    transform: pct_change_yoy
    cycle: "M"

  # ─── Japan (JP) ─────────────────────────────────────────────
  JP_GDP_QOQ:
    category: growth
    region: JP
    source: FRED
    series_id: NAEXKP01JPQ657S
    unit: "%"
    description: "Japan Real GDP (QoQ)"
    transform: pct_change
    cycle: "Q"

  JP_CPI_YOY:
    category: inflation
    region: JP
    source: FRED
    series_id: JPNCPIALLMINMEI
    unit: "%"
    description: "Japan CPI (YoY)"
    transform: pct_change_yoy
    cycle: "M"

  JP_UNEMP_RATE:
    category: employment
    region: JP
    source: FRED
    series_id: LRUNTTTTJPM156S
    unit: "%"
    description: "Japan Unemployment Rate"
    transform: none
    cycle: "M"

  JP_POLICY_RATE:
    category: policy
    region: JP
    source: FRED
    series_id: IRSTCI01JPM156N
    unit: "%"
    description: "Japan Short-term Interest Rate (BOJ)"
    transform: none
    cycle: "M"

  # ─── China (CN) ──────────────────────────────────────────────
  CN_GDP_YOY:
    category: growth
    region: CN
    source: FRED
    series_id: CHNGDPNQDSMEI
    unit: "%"
    description: "China Real GDP (YoY)"
    transform: pct_change_yoy
    cycle: "Q"

  CN_CPI_YOY:
    category: inflation
    region: CN
    source: FRED
    series_id: CHNCPIALLMINMEI
    unit: "%"
    description: "China CPI (YoY)"
    transform: pct_change_yoy
    cycle: "M"

  # ─── Euro Area (EU) ──────────────────────────────────────────
  EU_GDP_QOQ:
    category: growth
    region: EU
    source: FRED
    series_id: NAEXKP01EZQ657S
    unit: "%"
    description: "Euro Area Real GDP (QoQ)"
    transform: pct_change
    cycle: "Q"

  EU_CPI_YOY:
    category: inflation
    region: EU
    source: FRED
    series_id: CP0000EZ19M086NEST
    unit: "%"
    description: "Euro Area CPI (YoY)"
    transform: pct_change_yoy
    cycle: "M"

  EU_POLICY_RATE:
    category: policy
    region: EU
    source: FRED
    series_id: ECBDFR
    unit: "%"
    description: "ECB Deposit Facility Rate"
    transform: none
    cycle: "M"

  # ─── United Kingdom (UK) ─────────────────────────────────────
  UK_GDP_QOQ:
    category: growth
    region: UK
    source: FRED
    series_id: NAEXKP01GBQ657S
    unit: "%"
    description: "UK Real GDP (QoQ)"
    transform: pct_change
    cycle: "Q"

  UK_CPI_YOY:
    category: inflation
    region: UK
    source: FRED
    series_id: GBRCPIALLMINMEI
    unit: "%"
    description: "UK CPI (YoY)"
    transform: pct_change_yoy
    cycle: "M"

  # UK_POLICY_RATE: FRED에 BOE Bank Rate 월간 시리즈 없음 — 추후 대체 소스 확인
  # UK_POLICY_RATE:
  #   category: policy
  #   region: UK
  #   source: FRED
  #   series_id: TBD
  #   unit: "%"
  #   description: "Bank of England Bank Rate"
  #   transform: none
  #   cycle: "M"

  # ─── India (IN) ──────────────────────────────────────────────
  IN_GDP_YOY:
    category: growth
    region: IN
    source: FRED
    series_id: INDGDPRQPSMEI
    unit: "%"
    description: "India Real GDP (YoY)"
    transform: pct_change_yoy
    cycle: "Q"

  IN_CPI_YOY:
    category: inflation
    region: IN
    source: FRED
    series_id: INDCPIALLMINMEI
    unit: "%"
    description: "India CPI (YoY)"
    transform: pct_change_yoy
    cycle: "M"

  # ─── Global ─────────────────────────────────────────────────
  VIX:
    category: risk
    region: GLOBAL
    source: FRED
    series_id: VIXCLS
    unit: "index"
    description: "CBOE Volatility Index"
    transform: none

  DXY:
    category: fx
    region: GLOBAL
    source: FRED
    series_id: DTWEXBGS
    unit: "index"
    description: "US Dollar Index (Broad)"
    transform: none
