name: Regenerate Fund & Securities Index

# Pre-signed URL은 7일 만료. 업로드 시점 + 매일 한 번 자동 재생성하여
# 사용자 index.html 이 항상 신선한 URL을 갖도록 한다.
on:
  # malife_var_dashboard 에서 S3 업로드 후 repository_dispatch 로 호출
  repository_dispatch:
    types: [fund-index-refresh]
  # 매일 15:00 KST = 06:00 UTC — 7일 만료 전 안전 갱신
  schedule:
    - cron: "0 6 * * *"
  # 수동 실행
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regen-fund-index
  cancel-in-progress: false

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 python-dotenv

      - name: Regenerate index pages
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
        run: |
          python scripts/generate_fund_index.py
          python scripts/generate_securities_index.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/fund/index.html output/securities/index.html
          if git diff --cached --quiet; then
            echo "No changes — skip commit."
          else
            git commit -m "chore: fund index auto-regen ($(date -u +'%Y-%m-%d %H:%MZ'))"
            git push origin HEAD
          fi
