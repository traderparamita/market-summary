<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Summary</title>
<meta name="description" content="Daily, weekly, and monthly global market reports with data dashboards and AI-generated market stories">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<style>
@import url('https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/css/SpoqaHanSansNeo.css');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
:root {
  --bg: #f4f5f9;
  --card: #fff;
  --border: #e0e3ed;
  --text: #2d3148;
  --muted: #7c8298;
  --primary: #F58220;
  --primary-light: #fff3e6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Spoqa Han Sans Neo', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding: 48px 24px;
  max-width: 1200px;
  margin: 0 auto;
}
.header {
  text-align: center;
  margin-bottom: 48px;
  padding-bottom: 32px;
  border-bottom: 2px solid var(--border);
}
.header h1 {
  font-size: 36px;
  font-weight: 700;
  color: #1a1d2e;
  margin-bottom: 8px;
}
.header .tagline {
  font-size: 16px;
  color: var(--muted);
}
.sections {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 24px;
  margin-bottom: 48px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
  border-color: var(--primary);
}
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), #ff9d4d);
}
.card h2 {
  font-size: 22px;
  font-weight: 700;
  color: #1a1d2e;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.card .icon {
  font-size: 28px;
}
.card .desc {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 20px;
  line-height: 1.7;
}
.card .link {
  display: inline-block;
  padding: 10px 20px;
  background: var(--primary-light);
  color: var(--primary);
  text-decoration: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.2s;
}
.card .link:hover {
  background: var(--primary);
  color: white;
}
.badge {
  display: inline-block;
  padding: 2px 8px;
  background: #f0f1f6;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  border-radius: 4px;
  margin-left: 8px;
}
.footer {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  padding-top: 32px;
  border-top: 1px solid var(--border);
}
.footer a {
  color: var(--primary);
  text-decoration: none;
}
.footer a:hover {
  text-decoration: underline;
}
@media (max-width: 768px) {
  .sections {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="header">
  <h1>Market Summary</h1>
  <p class="tagline">Daily / Weekly / Monthly global market data dashboard + AI-generated stories</p>
</div>

<div class="sections">
  <div class="card">
    <h2>
      <span class="icon">📊</span>
      Market Summary
      <span class="badge">Data</span>
    </h2>
    <p class="desc">
      일간/주간/월간 Market Story + 글로벌 시장 데이터 대시보드.
    </p>
    <a href="summary/index.html" class="link">View Reports →</a>
  </div>
</div>

<div class="footer">
  <p>
    영업일 8시 30분 이전에 업데이트 됩니다<br>
    Powered by <a href="https://github.com/traderparamita/market-summary" target="_blank">market_summary</a>
  </p>
</div>

</body>
</html>
