<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anthilia</title>
<meta name="description" content="미래에셋 AI Investment Agent — 일간/주간/월간 글로벌 시장 리포트">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<style>
@import url('https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/css/SpoqaHanSansNeo.css');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
:root {
  --bg: #f4f5f9;
  --card: #fff;
  --border: #e0e3ed;
  --text: #2d3148;
  --muted: #7c8298;
  --primary: #F58220;
  --primary-light: #fff3e6;
  --navy: #043B72;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Spoqa Han Sans Neo', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}
.ma-nav {
  background: var(--navy);
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(4,59,114,.25);
}
.ma-nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  height: 48px;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.ma-nav-inner::-webkit-scrollbar { display: none; }
.ma-logo {
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  text-decoration: none;
  white-space: nowrap;
  padding-right: 20px;
  border-right: 1px solid rgba(255,255,255,.2);
  margin-right: 16px;
}
.ma-logo span {
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--primary);
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}
.ma-nav-link {
  color: rgba(255,255,255,.72);
  text-decoration: none;
  font-size: 13px;
  padding: 4px 10px;
  border-radius: 6px;
  white-space: nowrap;
  transition: all .15s;
}
.ma-nav-link:hover { color: #fff; background: rgba(255,255,255,.1); }
.ma-nav-link.current { color: #fff; background: var(--primary); font-weight: 600; }
.ma-nav-sep { width: 1px; height: 16px; background: rgba(255,255,255,.15); margin: 0 8px; flex-shrink: 0; }
.ma-page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 24px;
}
.header {
  text-align: center;
  margin-bottom: 48px;
  padding-bottom: 32px;
  border-bottom: 2px solid var(--border);
}
.header h1 {
  font-size: 36px;
  font-weight: 700;
  color: #1a1d2e;
  margin-bottom: 8px;
}
.header .tagline {
  font-size: 16px;
  color: var(--muted);
}
.sections {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 24px;
  margin-bottom: 48px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
  border-color: var(--primary);
}
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), #ff9d4d);
}
.card h2 {
  font-size: 22px;
  font-weight: 700;
  color: #1a1d2e;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.card .icon {
  font-size: 28px;
}
.card .desc {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 20px;
  line-height: 1.7;
}
.card .link {
  display: inline-block;
  padding: 10px 20px;
  background: var(--primary-light);
  color: var(--primary);
  text-decoration: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.2s;
}
.card .link:hover {
  background: var(--primary);
  color: white;
}
.badge {
  display: inline-block;
  padding: 2px 8px;
  background: #f0f1f6;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  border-radius: 4px;
  margin-left: 8px;
}
.footer {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  padding-top: 32px;
  border-top: 1px solid var(--border);
}
.footer a {
  color: var(--primary);
  text-decoration: none;
}
.footer a:hover {
  text-decoration: underline;
}
@media (max-width: 768px) {
  .sections {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<nav class="ma-nav">
  <div class="ma-nav-inner">
    <a href="index.html" class="ma-logo"><span></span>미래에셋생명</a>
    <a href="index.html" class="ma-nav-link current">홈</a>
    <div class="ma-nav-sep"></div>
    <a href="summary/index.html" class="ma-nav-link">Market Summary</a>
    <div class="ma-nav-sep"></div>
    <a href="analysis/index.html" class="ma-nav-link">Analysis</a>
    <div class="ma-nav-sep"></div>
    <a href="view/index.html" class="ma-nav-link">View</a>
    <div class="ma-nav-sep"></div>
    <a href="portfolio/index.html" class="ma-nav-link">Portfolio</a>
  </div>
</nav>

<div class="ma-page">
<div class="header">
  <h1>Anthilia</h1>
  <p class="tagline">미래에셋 AI Investment Agent</p>
</div>

<div class="sections">
  <div class="card">
    <h2>
      <span class="icon">📊</span>
      Market Summary
      <span class="badge">Data</span>
    </h2>
    <p class="desc">
      일간/주간/월간 Market Story + 글로벌 시장 데이터 대시보드.
    </p>
    <a href="summary/index.html" class="link">View Reports →</a>
  </div>


</div>

<div class="footer">
  <p>
    영업일 8시 30분 이전에 업데이트 됩니다<br>
    Powered by <a href="https://github.com/traderparamita/market-summary" target="_blank">market_summary</a>
  </p>
</div>
</div><!-- /ma-page -->

</body>
</html>
